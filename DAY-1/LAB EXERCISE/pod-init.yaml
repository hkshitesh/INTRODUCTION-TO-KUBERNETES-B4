apiVersion: v1
kind: Pod
metadata:
  name: init-demo
spec:
  initContainers:
  - name: init-container
    image: busybox
    command:
    - sh
    - -c
    - echo "Init Step Completed" > /workdir/index.html
    volumeMounts:
    - name: shared-data
      mountPath: /workdir

  containers:
  - name: app-container
    image: nginx
    volumeMounts:
    - name: shared-data
      mountPath: /usr/share/nginx/html

  volumes:
  - name: shared-data
    emptyDir: {}
